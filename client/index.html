<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContentCraft - AI Content Creation</title>
    <!-- Product Detection for SEO/Meta -->
    <script>
      (function() {
        var hostname = window.location.hostname;
        var APP_SLUG = 'contentcraft';
        var PRODUCT_NAME = 'ContentCraft';
        
        if (hostname.includes('gamemastercraft')) {
          APP_SLUG = 'gamemastercraft';
          PRODUCT_NAME = 'GameMasterCraft';
        } else if (hostname.includes('sagacraft')) {
          APP_SLUG = 'sagacraft';
          PRODUCT_NAME = 'SagaCraft';
        }
        
        // Expose for legacy compatibility
        window.APP_SLUG = APP_SLUG;
        window.PRODUCT_NAME = PRODUCT_NAME;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
